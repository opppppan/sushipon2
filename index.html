<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<meta name="googlebot" content="noindex, nofollow" />
<title>SHUSHI PON</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sushi-game/styles.css?v=17" />
</head>
<body>

<div class="page">

  <div class="title-plate">
    <div class="title-jp">寿司ポン</div>
  </div>

  <div class="layout-row">

  <!-- Super Famicom body -->
  <div class="sfc-console">
    <div class="sfc-cart"></div>

    <div class="sfc-top-bar">
      <div class="sfc-logo">
        SUPER <span class="r">■</span><span class="y">■</span><span class="g">■</span><span class="b">■</span> PON
      </div>
      <div class="sfc-vents">
        <div class="sfc-vent"></div><div class="sfc-vent"></div><div class="sfc-vent"></div>
        <div class="sfc-vent"></div><div class="sfc-vent"></div><div class="sfc-vent"></div>
      </div>
    </div>

    <div class="sfc-screen">
      <div id="root"></div>
    </div>

    <div class="sfc-bottom">
      <div class="sfc-switches">
        <div>
          <div class="sfc-switch on" id="sw-power"><div class="slide"></div></div>
          <div class="sfc-switch-label">POWER</div>
        </div>
        <div>
          <div class="sfc-switch" id="sw-reset"><div class="slide"></div></div>
          <div class="sfc-switch-label">RESET</div>
        </div>
      </div>
      <div class="sfc-brand-stamp">FT-SFC 1991</div>
      <div class="sfc-ports">
        <div class="sfc-port"></div>
        <div class="sfc-port"></div>
      </div>
    </div>
  </div>

  <!-- (evolution chart is now inside the game screen) -->

  </div><!-- /layout-row -->

  <div class="footer-tip">← → MOVE &nbsp;·&nbsp; SPACE / CLICK DROP &nbsp;·&nbsp; R RESET</div>
</div>

<!-- Game scripts -->
<script src="sushi-game/sprites.js?v=18"></script>
<script src="sushi-game/physics.js?v=18"></script>
<script src="sushi-game/audio.js?v=18"></script>
<script src="sushi-game/shooter.js?v=30boss"></script>

<!-- React + Babel (pinned) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="sushi-game/game.jsx?v=34"></script>
<script type="text/babel">
  const { createRoot } = ReactDOM;
  createRoot(document.getElementById('root')).render(<window.SushiGame />);

  // (evolution chart is now rendered inside the React game component)

  // Wire up the decorative console switches
  document.getElementById('sw-reset').addEventListener('click', () => {
    const el = document.getElementById('sw-reset');
    el.classList.add('on');
    setTimeout(() => el.classList.remove('on'), 300);
    // reset = just reload the page (quick and themey)
    location.reload();
  });
</script>

</body>
</html>
